<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>One Room Adventure</title>

  <!-- Link to CSS -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <main class="container">
    <!-- Room Title -->
    <h1 id="room-name">Loading room...</h1>

    <!-- Room Description -->
    <section id="room-desc">
      <p>Loading description...</p>
    </section>

    <section id="exits-area">
      <p>Exits: (loading...)</p>
    </section>

    <h2>Items</h2>
    <div id="items-area"></div>
    
    <h2>Inventory</h2>
  <div id="inventory-area"></div>

    <!-- Message Area (for future game messages) -->
    <div id="message-area"></div>
  </main>

  <script type="module" src="main.js"></script>
</body>
</html>
